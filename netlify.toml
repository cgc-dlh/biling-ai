[build]
  # Force rebuild cache invalidation v2
  command = "rm -rf .next && export SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL && export SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
